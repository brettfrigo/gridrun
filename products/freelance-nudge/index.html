<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelance Nudge — Get Paid Faster</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Freelance Nudge</h1>
    <p>Track invoices and generate reminder emails that get you paid.</p>
  </header>

  <main>
    <section class="card">
      <h2>Add Invoice</h2>
      <form id="invoiceForm">
        <label>Client name <input id="clientName" required /></label>
        <label>Client email <input id="clientEmail" type="email" required /></label>
        <label>Invoice # <input id="invoiceNumber" required /></label>
        <label>Amount ($) <input id="amount" type="number" min="0" step="0.01" required /></label>
        <label>Due date <input id="dueDate" type="date" required /></label>
        <button type="submit">Save Invoice</button>
      </form>
    </section>

    <section class="card">
      <h2>Outstanding Invoices</h2>
      <div id="summary"></div>
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Invoice</th>
            <th>Amount</th>
            <th>Days Late</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="invoiceTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Email Generator</h2>
      <p class="small">Select an invoice reminder and click “Generate”.</p>
      <div id="composer"></div>
      <textarea id="emailOutput" rows="14" placeholder="Generated email will appear here..."></textarea>
      <button id="copyBtn" type="button">Copy Email</button>
    </section>
  </main>

  <footer>
    <p>Local MVP. Data is stored in your browser only.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
